{% extends 'base.html' %}
{% load static %}

{% block title %}Редактирование изображения{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">
                        <i class="fas fa-edit"></i> Редактирование изображения
                    </h4>
                </div>
                <div class="card-body">
                    <div class="text-center mb-4">
                        <img src="{{ image.image.url }}" alt="{{ image.title }}" style="max-width: 100%; max-height: 300px; border-radius: 10px;">
                    </div>
                    
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="{{ form.title.id_for_label }}" class="form-label">Название</label>
                            {{ form.title }}
                        </div>
                        
                        <div class="mb-3">
                            <label for="{{ form.description.id_for_label }}" class="form-label">Описание</label>
                            {{ form.description }}
                        </div>
                        
                        <div class="mb-3">
                            <label for="{{ form.alt_text.id_for_label }}" class="form-label">Alt текст</label>
                            {{ form.alt_text }}
                        </div>
                        
                        <div class="mb-3 form-check">
                            {{ form.is_primary }}
                            <label class="form-check-label" for="{{ form.is_primary.id_for_label }}">
                                Сделать основным изображением
                            </label>
                        </div>
                        
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="{% url 'galleries:gallery_detail' gallery.id %}" class="btn btn-secondary">
                                <i class="fas fa-times"></i> Отмена
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i> Сохранить
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
