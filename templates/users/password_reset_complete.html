{% extends 'base.html' %}
{% load static %}

{% block title %}Пароль изменён | Guardian of the Worlds{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow border-0 auth-card">
                <div class="card-header text-center py-4 auth-header">
                    <div class="auth-icon-wrapper">
                        <i class="fas fa-check-circle fa-3x auth-icon"></i>
                    </div>
                    <h3 class="mt-3 mb-0" style="color: #f1f5f9;">Пароль изменён</h3>
                </div>
                <div class="card-body p-4 text-center">
                    <i class="fas fa-shield-alt fa-4x mb-4" style="color: #5eead4; opacity: 0.7;"></i>
                    <p style="color: #cbd5e6;">Ваш пароль успешно изменён!</p>
                    <p class="text-secondary small">Теперь вы можете войти с новым паролем.</p>
                    
                    <hr class="my-4 auth-hr">
                    
                    <a href="{% url 'users:login' %}" class="btn btn-primary rounded-pill auth-btn">
                        <i class="fas fa-sign-in-alt me-2"></i> Войти
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .auth-card {
        background: rgba(8, 10, 20, 0.95) !important;
        backdrop-filter: blur(16px);
        border: 1px solid rgba(139, 92, 246, 0.5) !important;
        border-radius: 28px;
        box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(139, 92, 246, 0.2) inset;
    }
    .auth-header {
        background: linear-gradient(135deg, rgba(109, 40, 217, 0.4), rgba(45, 212, 191, 0.2)) !important;
        border-radius: 28px 28px 0 0 !important;
        border-bottom: 1px solid rgba(139, 92, 246, 0.3);
    }
    .auth-icon-wrapper {
        background: linear-gradient(135deg, #6d28d9, #3b0764);
        width: 70px;
        height: 70px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto;
        box-shadow: 0 0 20px rgba(109, 40, 217, 0.5);
    }
    .auth-icon {
        color: white !important;
        background: transparent !important;
        -webkit-background-clip: unset !important;
        background-clip: unset !important;
    }
    .auth-btn {
        background: linear-gradient(105deg, #6d28d9, #3b0764);
        border: none;
        transition: all 0.3s;
        box-shadow: 0 4px 15px rgba(109, 40, 217, 0.4);
        padding: 0.8rem 2rem;
    }
    .auth-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(139, 92, 246, 0.5);
        background: linear-gradient(105deg, #7c3aed, #4c1d95);
    }
    .auth-hr {
        border-color: rgba(139, 92, 246, 0.3);
    }
</style>
{% endblock %}
