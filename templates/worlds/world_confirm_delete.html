{% extends 'base.html' %}
{% load static %}

{% block title %}Удаление мира{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-danger">
                <div class="card-header bg-danger text-white">
                    <h4 class="mb-0">Удаление мира</h4>
                </div>
                <div class="card-body text-center">
                    <i class="fas fa-exclamation-triangle fa-4x text-danger mb-3"></i>
                    <h5>Вы уверены, что хотите удалить мир "{{ world.name }}"?</h5>
                    <p class="text-muted">Это действие необратимо. Все категории и элементы будут удалены.</p>

                    <form method="post">
                        {% csrf_token %}
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-danger">Да, удалить</button>
                            <a href="{% url 'worlds:world_detail' world.id %}" class="btn btn-secondary">Отмена</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
